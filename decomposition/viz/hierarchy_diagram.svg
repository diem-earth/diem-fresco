<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 762"><defs><marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker></defs><rect width="1200" height="762" fill="white"/><rect x="60" y="40" width="1080" height="72" rx="10" fill="#888888" fill-opacity="0.25" stroke="#888888" stroke-width="2.5"/><text x="84" y="70" font-family="Helvetica" font-size="24" font-weight="bold" fill="#111">L0 — Canvas — full band</text><text x="84" y="98" font-family="Helvetica" font-size="20" fill="#444">1 region</text><line x1="600" y1="112" x2="600" y2="134" stroke="#666" stroke-width="2.5" marker-end="url(#ar)"/><rect x="60" y="136" width="1080" height="72" rx="10" fill="#2166ac" fill-opacity="0.25" stroke="#2166ac" stroke-width="2.5"/><text x="84" y="166" font-family="Helvetica" font-size="24" font-weight="bold" fill="#111">L1 — Macro geography (banks, Seine, islands, bridges, exterior)</text><text x="84" y="194" font-family="Helvetica" font-size="20" fill="#444">9 regions</text><line x1="600" y1="208" x2="600" y2="230" stroke="#666" stroke-width="2.5" marker-end="url(#ar)"/><rect x="60" y="232" width="1080" height="72" rx="10" fill="#4393c3" fill-opacity="0.25" stroke="#4393c3" stroke-width="2.5"/><text x="84" y="262" font-family="Helvetica" font-size="24" font-weight="bold" fill="#111">L2 — Arrondissements (cell-snapped, official boundaries)</text><text x="84" y="290" font-family="Helvetica" font-size="20" fill="#444">16 regions</text><line x1="600" y1="304" x2="600" y2="326" stroke="#666" stroke-width="2.5" marker-end="url(#ar)"/><rect x="60" y="328" width="1080" height="72" rx="10" fill="#92c5de" fill-opacity="0.25" stroke="#92c5de" stroke-width="2.5"/><text x="84" y="358" font-family="Helvetica" font-size="24" font-weight="bold" fill="#111">L3 — Quartiers administratifs (cell-snapped)</text><text x="84" y="386" font-family="Helvetica" font-size="20" fill="#444">47 regions</text><line x1="600" y1="400" x2="600" y2="422" stroke="#666" stroke-width="2.5" marker-end="url(#ar)"/><rect x="60" y="424" width="1080" height="72" rx="10" fill="#5aae61" fill-opacity="0.25" stroke="#5aae61" stroke-width="2.5"/><text x="84" y="454" font-family="Helvetica" font-size="24" font-weight="bold" fill="#111">L4 — Semantic units (parks, plazas, rail, islands, water) — overlay</text><text x="84" y="482" font-family="Helvetica" font-size="20" fill="#444">28 units</text><line x1="600" y1="496" x2="600" y2="518" stroke="#666" stroke-width="2.5" marker-end="url(#ar)"/><rect x="60" y="520" width="1080" height="72" rx="10" fill="#d6604d" fill-opacity="0.25" stroke="#d6604d" stroke-width="2.5"/><text x="84" y="550" font-family="Helvetica" font-size="24" font-weight="bold" fill="#111">L5 — Superblocks (major-road bounded tiles) — RECOMMENDED generation level</text><text x="84" y="578" font-family="Helvetica" font-size="20" fill="#444">84 regions</text><line x1="600" y1="592" x2="600" y2="614" stroke="#666" stroke-width="2.5" marker-end="url(#ar)"/><rect x="60" y="616" width="1080" height="72" rx="10" fill="#f4a582" fill-opacity="0.25" stroke="#f4a582" stroke-width="2.5"/><text x="84" y="646" font-family="Helvetica" font-size="24" font-weight="bold" fill="#111">L6 — Atomic enclosed street cells (city blocks)</text><text x="84" y="674" font-family="Helvetica" font-size="20" fill="#444">2560 cells</text><text x="84" y="730" font-family="Helvetica" font-size="19" fill="#333">Nesting: L6 ⊂ L5 ⊂ L3 ⊂ L2 ⊂ L1 ⊂ L0 (L5→L3 by dominant quartier; purity in metadata). L4 is a semantic overlay on L6 groups.</text></svg>